# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  generate-go:
    desc: Generate Go code from proto files
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - find ./shared/proto -name "*.proto" | xargs protoc -I=./shared/proto --go_out=./engine/internal/proto --go_opt=paths=source_relative --go-grpc_out=./engine/internal/proto --go-grpc_opt=paths=source_relative
      - cmd: echo "✅ Go gRPC code generated successfully!"
        silent: true

  generate-rust:
    desc: "Generate Rust gRPC code from proto files"
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - cd identity-service && cargo run --bin build-proto
      - cmd: echo "✅ Rust gRPC code generated successfully!"
        silent: true