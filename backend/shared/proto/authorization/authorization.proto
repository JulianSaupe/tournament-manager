syntax = "proto3";

package authorization;

option go_package = "engine/internal/proto/authorization";

service AuthorizationService {
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  rpc GetUserPermissions(GetUserPermissionsRequest) returns (GetUserPermissionsResponse);
  rpc AssignRoleToUser(AssignRoleToUserRequest) returns (AssignRoleToUserResponse);
  rpc RemoveRoleFromUser(RemoveRoleFromUserRequest) returns (RemoveRoleFromUserResponse);
  rpc GetUserRoles(GetUserRolesRequest) returns (GetUserRolesResponse);
}

// Check Permission
message CheckPermissionRequest {
  string user_id = 1;
  string permission_name = 2;
}

message CheckPermissionResponse {
  bool allowed = 1;
  string message = 2;
}

// Get User Permissions
message GetUserPermissionsRequest {
  string user_id = 1;
}

message GetUserPermissionsResponse {
  repeated string permission_names = 1;
  bool success = 2;
}

// Assign Role to User
message AssignRoleToUserRequest {
  string user_id = 1;
  string role_id = 2;
}

message AssignRoleToUserResponse {
  bool success = 1;
  string message = 2;
}

// Remove Role from User
message RemoveRoleFromUserRequest {
  string user_id = 1;
  string role_id = 2;
}

message RemoveRoleFromUserResponse {
  bool success = 1;
  string message = 2;
}

// Get User Roles
message GetUserRolesRequest {
  string user_id = 1;
}

message GetUserRolesResponse {
  repeated string role_ids = 1;
  bool success = 2;
  string message = 3;
}